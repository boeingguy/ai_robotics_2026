%YAML:1.0

Camera:
  name: "My Phone Camera - Indoor Walking"
  setup: "monocular"
  model: "perspective"
  fx: 2800.0
  fy: 2800.0
  cx: 1920.0
  cy: 1080.0
  k1: -0.15
  k2: 0.05
  p1: 0.0
  p2: 0.0
  k3: 0.0

  fps: 30.0
  cols: 3840
  rows: 2160
  color_order: "BGR"

Preprocessing:
  min_size: 800

Feature:
  name: "ORB for high-res indoor"
  scale_factor: 1.2
  num_levels: 8
  ini_fast_threshold: 20
  min_fast_threshold: 7

Mapping:
  backend: "g2o"

Tracking:
  backend: "g2o"
